<!DOCTYPE html> 
<html>
<head>
  <title>Monaco Investment Partners, LP</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;

    .contact {
      font-size: 14px;
      color: #9ca3af;
    }

    .contact a {
      color: #3b82f6;
      text-decoration: none;
